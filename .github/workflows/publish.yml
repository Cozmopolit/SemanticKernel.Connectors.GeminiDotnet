name: Publish to GitHub Packages

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g., 1.0.0)'
        required: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
      
      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" == "release" ]; then
            VERSION="${{ github.event.release.tag_name }}"
            # Remove 'v' prefix if present
            VERSION="${VERSION#v}"
          else
            VERSION="${{ github.event.inputs.version }}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
      
      - name: Restore dependencies
        run: dotnet restore src/SemanticKernel.Connectors.GeminiDotnet.csproj
      
      - name: Build
        run: dotnet build src/SemanticKernel.Connectors.GeminiDotnet.csproj -c Release --no-restore
      
      - name: Pack
        run: dotnet pack src/SemanticKernel.Connectors.GeminiDotnet.csproj -c Release --no-build -p:Version=${{ steps.version.outputs.version }} -o ./nupkg
      
      - name: Push to GitHub Packages
        run: dotnet nuget push ./nupkg/*.nupkg --source "https://nuget.pkg.github.com/Cozmopolit/index.json" --api-key ${{ secrets.GITHUB_TOKEN }} --skip-duplicate

