name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        dotnet-version: ['8.0.x', '9.0.x']
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup .NET ${{ matrix.dotnet-version }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ matrix.dotnet-version }}
      
      - name: Restore dependencies
        run: |
          dotnet restore src/SemanticKernel.Connectors.GeminiDotnet.csproj
          dotnet restore tests/SemanticKernel.Connectors.GeminiDotnet.Tests.csproj
      
      - name: Build
        run: |
          dotnet build src/SemanticKernel.Connectors.GeminiDotnet.csproj -c Release --no-restore
          dotnet build tests/SemanticKernel.Connectors.GeminiDotnet.Tests.csproj -c Release --no-restore

      - name: Test
        run: dotnet test tests/SemanticKernel.Connectors.GeminiDotnet.Tests.csproj -c Release --no-build --verbosity normal --logger "trx;LogFileName=test-results.trx"

